name: Deploy to Oracle

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://tools.devstackio.com
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test tests/security.spec.ts tests/api.spec.ts
      - name: Run npm audit
        continue-on-error: true
        run: npm audit --audit-level=high

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
      - name: Check for secrets
        run: |
          echo "Checking for committed .env files..."
          if git ls-files | grep -q '\.env\.'; then
            echo "WARNING: .env files found in git tracking!"
            git ls-files | grep '\.env\.'
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT || 22 }}
          script: |
            set -e
            cd /var/www/tools

            # Create logs directory
            mkdir -p logs

            # Pull latest changes
            git fetch origin
            git reset --hard origin/main

            # Create .env from GitHub Secrets
            # Values are injected at deploy time, never committed to git
            printf '%s\n' \
              'NEXT_PUBLIC_SITE_URL=https://tools.devstackio.com' \
              'NEXT_PUBLIC_CONTACT_EMAIL=contact@devstackio.com' \
              "NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}" \
              "NEXT_PUBLIC_ADSENSE_PUBLISHER_ID=${{ secrets.NEXT_PUBLIC_ADSENSE_PUBLISHER_ID }}" \
              "IP_HASH_SALT=${{ secrets.IP_HASH_SALT }}" \
              'PORT=3000' \
              'NODE_ENV=production' > .env

            # Install dependencies and build
            npm ci
            npm run build

            # Prepare standalone output
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/
            cp -r public .next/standalone/

            # Restart application
            pm2 restart tools || pm2 start ecosystem.config.js
            pm2 save

            # Verify deployment
            sleep 5
            curl -sf http://localhost:3000/api/health || exit 1
            echo "Deployment successful"
