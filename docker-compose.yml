services:
  devstackio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: https://tools.devstackio.com
    container_name: devstackio-tools
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SITE_URL=https://tools.devstackio.com
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
      - NEXT_PUBLIC_ADSENSE_PUBLISHER_ID=${NEXT_PUBLIC_ADSENSE_PUBLISHER_ID:-}
      - NEXT_PUBLIC_CONTACT_EMAIL=contact@devstackio.com
      - DISABLE_RATE_LIMIT=true
    volumes:
      - devstackio-data:/app/data
    networks:
      - devstackio-internal

    # ─── Resource Limits (Defense in Depth - Layer 2) ───
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    # ─── Security Hardening ───
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M,noexec,nosuid
      - /app/.next:size=100M,noexec,nosuid
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 200
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535
      - net.ipv4.tcp_syncookies=1
      - net.ipv4.tcp_max_syn_backlog=2048
      - net.ipv4.tcp_synack_retries=2

    # ─── Health Check ───
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "devstackio"

    # ─── Prevent container from accessing other services ───
    depends_on: {}

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: devstackio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    networks:
      - devstackio-internal
    depends_on:
      devstackio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  devstackio-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  devstackio-internal:
    driver: bridge
    internal: false
